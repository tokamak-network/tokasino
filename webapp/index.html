<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokasino — Instant Dice</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
  --neon: #00ff88; --neon-dim: #00ff8833;
  --hot: #ff3366; --hot-dim: #ff336633;
  --gold: #ffd700; --gold-dim: #ffd70033;
  --text: #e0e0e8; --muted: #6a6a7a;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; }
body::after { content:''; position:fixed; inset:0; background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events:none; z-index:999; }
.container { max-width:720px; margin:0 auto; padding:1.5rem; }

/* Header */
header { text-align:center; padding:2rem 0 1rem; }
header h1 { font-size:clamp(2rem,5vw,3rem); font-weight:700; letter-spacing:-0.03em; background:linear-gradient(135deg,var(--neon),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
header p { color:var(--muted); font-family:var(--mono); font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase; margin-top:0.3rem; }

/* Status bar */
.status-bar { display:flex; justify-content:center; gap:1.5rem; margin:1rem 0; font-family:var(--mono); font-size:0.7rem; }
.status-item { display:flex; align-items:center; gap:0.3rem; }
.dot { width:6px; height:6px; border-radius:50%; }
.dot.live { background:var(--neon); animation:pulse 1.5s ease-in-out infinite; }
.dot.dead { background:var(--hot); }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 4px var(--neon)} 50%{opacity:.4;box-shadow:none} }

/* Stats */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin:1rem 0; }
.stat { background:var(--surface); padding:0.8rem; text-align:center; }
.stat-label { font-family:var(--mono); font-size:0.6rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
.stat-val { font-size:1.1rem; font-weight:700; font-family:var(--mono); margin-top:0.2rem; }

/* Dice picker */
.game-area { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.5rem; margin:1rem 0; }
.section-title { font-family:var(--mono); font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.12em; margin-bottom:1rem; }
.dice-picker { display:grid; grid-template-columns:repeat(6,1fr); gap:0.5rem; margin-bottom:1.5rem; }
.dice-btn { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:1.8rem; background:var(--bg); border:2px solid var(--border); border-radius:12px; cursor:pointer; transition:all 0.15s; }
.dice-btn:hover { border-color:var(--neon); transform:scale(1.05); }
.dice-btn.selected { border-color:var(--neon); background:var(--neon-dim); box-shadow:0 0 20px var(--neon-dim); }

/* Bet controls */
.bet-row { display:flex; gap:0.5rem; align-items:center; margin-bottom:1rem; }
.bet-input { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.7rem; color:var(--text); font-family:var(--mono); font-size:0.9rem; text-align:center; }
.bet-input:focus { outline:none; border-color:var(--neon); }
.bet-preset { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.7rem 1rem; color:var(--muted); font-family:var(--mono); font-size:0.7rem; cursor:pointer; transition:all 0.15s; }
.bet-preset:hover { border-color:var(--text); color:var(--text); }

/* Play button */
.play-btn { width:100%; padding:1rem; border:none; border-radius:12px; font-family:var(--sans); font-size:1.1rem; font-weight:700; cursor:pointer; text-transform:uppercase; letter-spacing:0.08em; transition:all 0.2s; }
.play-btn.ready { background:var(--neon); color:var(--bg); }
.play-btn.ready:hover { box-shadow:0 0 30px var(--neon-dim),0 0 60px var(--neon-dim); transform:translateY(-1px); }
.play-btn:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; transform:none; box-shadow:none; }
.play-btn.connect { background:transparent; border:2px solid var(--gold); color:var(--gold); }
.play-btn.connect:hover { background:var(--gold); color:var(--bg); }

/* Result overlay */
.result-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; align-items:center; justify-content:center; }
.result-overlay.show { display:flex; }
.result-card { background:var(--surface); border:2px solid var(--border); border-radius:20px; padding:2.5rem; text-align:center; max-width:400px; width:90%; animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
.result-card.win { border-color:var(--neon); }
.result-card.lose { border-color:var(--hot); }
.result-emoji { font-size:4rem; margin-bottom:0.5rem; }
.result-title { font-size:1.5rem; font-weight:700; margin-bottom:0.3rem; }
.result-title.win { color:var(--neon); }
.result-title.lose { color:var(--hot); }
.result-detail { font-family:var(--mono); font-size:0.8rem; color:var(--muted); margin-top:0.5rem; line-height:1.6; }
.result-payout { font-size:1.8rem; font-weight:700; color:var(--gold); margin:0.5rem 0; }
.result-close { margin-top:1rem; background:transparent; border:1px solid var(--border); color:var(--text); padding:0.6rem 2rem; border-radius:100px; font-family:var(--sans); cursor:pointer; }
.result-close:hover { border-color:var(--text); }
.result-seed { font-family:var(--mono); font-size:0.6rem; color:var(--muted); word-break:break-all; margin-top:0.8rem; padding:0.5rem; background:var(--bg); border-radius:6px; }

/* History */
.history { margin-top:1rem; }
.history-item { display:grid; grid-template-columns:2.5rem 2rem 1fr auto auto; gap:0.8rem; align-items:center; padding:0.6rem 0.8rem; border-bottom:1px solid var(--border); font-family:var(--mono); font-size:0.75rem; animation:slideIn 0.2s ease-out; }
@keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
.history-item .num { color:var(--muted); }
.history-item .result-tag { padding:0.15rem 0.5rem; border-radius:4px; font-size:0.65rem; font-weight:600; }
.result-tag.win { background:var(--neon-dim); color:var(--neon); }
.result-tag.lose { background:var(--hot-dim); color:var(--hot); }

/* Responsive */
@media(max-width:500px) {
  .stats { grid-template-columns:repeat(2,1fr); }
  .dice-picker { grid-template-columns:repeat(3,1fr); }
  .history-item { grid-template-columns:2rem 2rem 1fr auto; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>TOKASINO</h1>
    <p>Instant On-Chain Dice</p>
  </header>

  <div class="status-bar">
    <div class="status-item">
      <div class="dot" id="dotStatus"></div>
      <span id="connStatus">Disconnected</span>
    </div>
    <div class="status-item">
      <span>Block <span id="blockNum">—</span></span>
    </div>
    <div class="status-item">
      <span>Chain <span id="chainId">—</span></span>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Balance</div>
      <div class="stat-val" id="balance">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">House</div>
      <div class="stat-val" id="houseBalance">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Games</div>
      <div class="stat-val" id="totalGames">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Win Rate</div>
      <div class="stat-val" id="winRate">—</div>
    </div>
  </div>

  <div class="game-area">
    <div class="section-title">Pick Your Number</div>
    <div class="dice-picker" id="dicePicker">
      <button class="dice-btn" data-num="1" onclick="selectDice(1)">⚀</button>
      <button class="dice-btn" data-num="2" onclick="selectDice(2)">⚁</button>
      <button class="dice-btn" data-num="3" onclick="selectDice(3)">⚂</button>
      <button class="dice-btn" data-num="4" onclick="selectDice(4)">⚃</button>
      <button class="dice-btn" data-num="5" onclick="selectDice(5)">⚄</button>
      <button class="dice-btn" data-num="6" onclick="selectDice(6)">⚅</button>
    </div>

    <div class="section-title">Bet Amount (ETH)</div>
    <div class="bet-row">
      <button class="bet-preset" onclick="setBet('0.001')">0.001</button>
      <button class="bet-preset" onclick="setBet('0.01')">0.01</button>
      <button class="bet-preset" onclick="setBet('0.05')">0.05</button>
      <button class="bet-preset" onclick="setBet('0.1')">0.1</button>
      <input class="bet-input" id="betAmount" type="text" value="0.01" placeholder="ETH">
    </div>

    <button class="play-btn connect" id="playBtn" onclick="handlePlay()">
      Connect Wallet
    </button>
  </div>

  <div class="history">
    <div class="section-title">Your Games</div>
    <div id="historyList"></div>
  </div>
</div>

<!-- Result overlay -->
<div class="result-overlay" id="resultOverlay" onclick="closeResult(event)">
  <div class="result-card" id="resultCard">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-payout" id="resultPayout"></div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="result-seed" id="resultSeed"></div>
    <button class="result-close" onclick="closeResult()">Play Again</button>
  </div>
</div>

<script>
const DICE_CONTRACT = '0x9fe46736679d2d9a65f0992f2272de9f3c7fa6e0';
const DICE_EMOJI = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
const CHAIN_ID = 7777;
const RPC_URL = 'http://localhost:8545';

let provider = null;
let signer = null;
let account = null;
let selectedDice = null;
let myWins = 0;
let myGames = 0;

async function handlePlay() {
  if (!account) {
    await connectWallet();
  } else {
    await playGame();
  }
}

async function connectWallet() {
  if (!window.ethereum) {
    alert('MetaMask를 설치해주세요!');
    return;
  }
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    account = accounts[0];

    // Switch to Tokasino chain
    try {
      await window.ethereum.request({
        method: 'wallet_switchEthereumChain',
        params: [{ chainId: '0x' + CHAIN_ID.toString(16) }],
      });
    } catch (e) {
      if (e.code === 4902) {
        await window.ethereum.request({
          method: 'wallet_addEthereumChain',
          params: [{
            chainId: '0x' + CHAIN_ID.toString(16),
            chainName: 'Tokasino L2',
            rpcUrls: [RPC_URL],
            nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
          }],
        });
      }
    }

    document.getElementById('playBtn').className = 'play-btn ready';
    document.getElementById('playBtn').textContent = 'ROLL DICE';
    document.getElementById('dotStatus').className = 'dot live';
    document.getElementById('connStatus').textContent = account.slice(0,6) + '...' + account.slice(-4);

    updateStats();
    setInterval(updateStats, 3000);
  } catch (e) {
    console.error(e);
  }
}

function selectDice(num) {
  selectedDice = num;
  document.querySelectorAll('.dice-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`[data-num="${num}"]`).classList.add('selected');
}

async function playGame() {
  if (!selectedDice) { alert('숫자를 선택해주세요!'); return; }

  const betEth = document.getElementById('betAmount').value;
  const betWei = '0x' + BigInt(Math.floor(parseFloat(betEth) * 1e18)).toString(16);

  const btn = document.getElementById('playBtn');
  btn.disabled = true;
  btn.textContent = 'ROLLING...';

  try {
    // Encode play(uint8) call
    const data = '0x5c492129' + selectedDice.toString(16).padStart(64, '0');

    const txHash = await window.ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: account,
        to: DICE_CONTRACT,
        value: betWei,
        data: data,
        gas: '0x30000',
      }],
    });

    btn.textContent = 'CONFIRMING...';

    // Wait for receipt
    let receipt = null;
    for (let i = 0; i < 30; i++) {
      await new Promise(r => setTimeout(r, 1000));
      receipt = await rpc('eth_getTransactionReceipt', [txHash]);
      if (receipt) break;
    }

    if (receipt && receipt.status === '0x1') {
      // Parse GamePlayed event from logs
      const gameLog = receipt.logs.find(l =>
        l.topics[0] === '0x99fc187654a8b4875aa54c915d830c89936e6cbc7b84c883edac698e794462c5'
      );

      if (gameLog) {
        const d = gameLog.data;
        const chosen = parseInt(d.slice(2, 66), 16);
        const rolled = parseInt(d.slice(66, 130), 16);
        const bet = parseInt(d.slice(130, 194), 16);
        const payout = parseInt(d.slice(194, 258), 16);
        const won = parseInt(d.slice(258, 322), 16) !== 0;
        const seed = '0x' + d.slice(322, 386);

        myGames++;
        if (won) myWins++;

        showResult(chosen, rolled, won, bet, payout, seed, txHash);
        addHistory(chosen, rolled, won, payout, txHash);
        updateStats();
      }
    } else {
      alert('Transaction failed!');
    }
  } catch (e) {
    console.error(e);
    if (e.code !== 4001) alert('Error: ' + (e.message || e));
  }

  btn.disabled = false;
  btn.textContent = 'ROLL DICE';
}

function showResult(chosen, rolled, won, bet, payout, seed, txHash) {
  const overlay = document.getElementById('resultOverlay');
  const card = document.getElementById('resultCard');
  card.className = 'result-card ' + (won ? 'win' : 'lose');

  document.getElementById('resultEmoji').textContent =
    won ? '🎉' : DICE_EMOJI[rolled];
  document.getElementById('resultTitle').textContent =
    won ? 'YOU WIN!' : 'YOU LOSE';
  document.getElementById('resultTitle').className =
    'result-title ' + (won ? 'win' : 'lose');
  document.getElementById('resultPayout').textContent =
    won ? '+' + (payout / 1e18).toFixed(4) + ' ETH' : '';
  document.getElementById('resultDetail').innerHTML =
    `You picked ${DICE_EMOJI[chosen]} <b>${chosen}</b> — Rolled ${DICE_EMOJI[rolled]} <b>${rolled}</b><br>` +
    `Bet: ${(bet/1e18).toFixed(4)} ETH` + (won ? ` → Payout: ${(payout/1e18).toFixed(4)} ETH (5x)` : '');
  document.getElementById('resultSeed').textContent = 'VRF Seed: ' + seed;

  overlay.classList.add('show');
}

function closeResult(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('resultOverlay').classList.remove('show');
}

function addHistory(chosen, rolled, won, payout, txHash) {
  const list = document.getElementById('historyList');
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `
    <span class="num">#${myGames}</span>
    <span>${DICE_EMOJI[rolled]}</span>
    <span>Picked ${chosen}, Rolled ${rolled}</span>
    <span>${won ? '+'+(payout/1e18).toFixed(3) : '-'+(parseFloat(document.getElementById('betAmount').value)).toFixed(3)}</span>
    <span class="result-tag ${won?'win':'lose'}">${won?'WIN':'LOSE'}</span>
  `;
  list.insertBefore(item, list.firstChild);
}

async function updateStats() {
  try {
    const block = await rpc('eth_blockNumber');
    document.getElementById('blockNum').textContent = parseInt(block, 16);
    document.getElementById('chainId').textContent = CHAIN_ID;

    if (account) {
      const bal = await rpc('eth_getBalance', [account, 'latest']);
      document.getElementById('balance').textContent = (parseInt(bal, 16) / 1e18).toFixed(3);
    }

    const house = await rpc('eth_call', [{to: DICE_CONTRACT, data: '0x6afbb01b'}, 'latest']);
    document.getElementById('houseBalance').textContent = (parseInt(house, 16) / 1e18).toFixed(1);

    const total = await rpc('eth_call', [{to: DICE_CONTRACT, data: '0x70de828e'}, 'latest']);
    document.getElementById('totalGames').textContent = parseInt(total, 16);

    document.getElementById('winRate').textContent =
      myGames > 0 ? Math.round(myWins/myGames*100) + '%' : '—';
  } catch(e) {}
}

async function rpc(method, params = []) {
  const res = await fetch(RPC_URL, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({jsonrpc:'2.0', method, params, id: Date.now()})
  });
  const d = await res.json();
  return d.result;
}

// Init: just poll stats even without wallet
(async () => {
  try {
    const chainId = await rpc('eth_chainId');
    if (parseInt(chainId, 16) === CHAIN_ID) {
      document.getElementById('dotStatus').className = 'dot live';
      document.getElementById('connStatus').textContent = 'Chain ' + CHAIN_ID;
    }
    updateStats();
    setInterval(updateStats, 3000);
  } catch(e) {
    document.getElementById('dotStatus').className = 'dot dead';
  }
})();

// Keyboard: 1-6 to select dice, Enter to play
document.addEventListener('keydown', e => {
  const n = parseInt(e.key);
  if (n >= 1 && n <= 6) selectDice(n);
  if (e.key === 'Enter' && account) playGame();
});
</script>
</body>
</html>
