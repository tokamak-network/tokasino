<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokasino — Game Hub</title>
<link rel="stylesheet" href="shared/style.css">
</head>
<body>

<div class="container">
  <header>
    <h1>TOKASINO</h1>
    <p>On-Chain Casino</p>
  </header>

  <div class="status-bar">
    <div class="status-item">
      <div class="dot dead" id="dotStatus"></div>
      <span>Block <span id="blockNum">&mdash;</span></span>
    </div>
    <div class="status-item">
      <span>Chain <span id="chainId">&mdash;</span></span>
    </div>
  </div>

  <appkit-button></appkit-button>

  <div style="text-align:center; margin:1rem 0;">
    <a href="setup.html" style="font-family:var(--mono); font-size:0.75rem; padding:0.5rem 1.2rem; border:1px solid var(--gold); border-radius:100px; color:var(--gold); display:inline-block; transition:all 0.2s; margin-right:0.5rem;"
       onmouseover="this.style.background='var(--gold)';this.style.color='var(--bg)'"
       onmouseout="this.style.background='transparent';this.style.color='var(--gold)'"
    >SETUP</a>
    <a href="demo.html" style="font-family:var(--mono); font-size:0.75rem; padding:0.5rem 1.2rem; border:1px solid var(--neon); border-radius:100px; color:var(--neon); display:inline-block; transition:all 0.2s;"
       onmouseover="this.style.background='var(--neon)';this.style.color='var(--bg)'"
       onmouseout="this.style.background='transparent';this.style.color='var(--neon)'"
    >DEMO &rarr;</a>
  </div>

  <div class="game-grid">
    <a class="game-card" href="dice.html">
      <div class="card-icon">&#x1F3B2;</div>
      <div class="card-title">Dice</div>
      <div class="card-desc">Pick 1-6, roll for 5x</div>
      <div class="card-stats">
        <span>House: <span id="dice-house">&mdash;</span> ETH</span>
        <span>Games: <span id="dice-games">&mdash;</span></span>
      </div>
    </a>
    <a class="game-card" href="coinflip.html">
      <div class="card-icon">&#x1FA99;</div>
      <div class="card-title">Coin Flip</div>
      <div class="card-desc">Heads or tails, 1.95x</div>
      <div class="card-stats">
        <span>House: <span id="coinflip-house">&mdash;</span> ETH</span>
        <span>Games: <span id="coinflip-games">&mdash;</span></span>
      </div>
    </a>
    <a class="game-card" href="roulette.html">
      <div class="card-icon">&#x1F3AF;</div>
      <div class="card-title">Roulette</div>
      <div class="card-desc">Spin the wheel, up to 36x</div>
      <div class="card-stats">
        <span>House: <span id="roulette-house">&mdash;</span> ETH</span>
        <span>Games: <span id="roulette-games">&mdash;</span></span>
      </div>
    </a>
    <a class="game-card" href="lottery.html">
      <div class="card-icon">&#x1F39F;&#xFE0F;</div>
      <div class="card-title">Lottery</div>
      <div class="card-desc">Buy tickets, win the pot</div>
      <div class="card-stats">
        <span>House: <span id="lottery-house">&mdash;</span> ETH</span>
        <span>Rounds: <span id="lottery-games">&mdash;</span></span>
      </div>
    </a>
  </div>
</div>

<script type="module" src="/src/hub.js"></script>
</body>
</html>
