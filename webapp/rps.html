<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPS CHAIN — Rock Paper Scissors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Silkscreen&display=swap" rel="stylesheet">
<style>
/* ===== DESIGN SYSTEM (PRD §1) ===== */
:root {
  --bg-primary: #0A0A1A;
  --bg-secondary: #12122A;
  --bg-surface: #1A1A3E;
  --neon-cyan: #00F0FF;
  --neon-pink: #FF2E97;
  --neon-yellow: #FFE600;
  --neon-green: #39FF14;
  --neon-purple: #B026FF;
  --text-primary: #EAEAEA;
  --text-secondary: #7A7A9E;
  --text-muted: #4A4A6A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'VT323', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* CRT Scanlines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* Grid pattern */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 1;
}

/* Scanline sweep animation */
@keyframes scanSweep {
  0% { top: -2px; }
  100% { top: 100%; }
}
.scan-sweep {
  position: fixed;
  left: 0; right: 0;
  height: 2px;
  background: rgba(0,240,255,0.08);
  z-index: 9998;
  animation: scanSweep 3s linear infinite;
  pointer-events: none;
}

/* ===== TOP BAR (PRD §2.2) ===== */
.top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: var(--bg-primary);
  border-bottom: 1px solid rgba(0,240,255,0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 100;
}

.top-bar .logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 16px;
  color: var(--neon-cyan);
  text-shadow: 0 0 7px #00F0FF, 0 0 10px #00F0FF, 0 0 21px #00F0FF;
  text-decoration: none;
}

.top-bar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.balance-display {
  font-family: 'VT323', monospace;
  font-size: 20px;
  color: var(--neon-yellow);
  display: flex;
  align-items: center;
  gap: 6px;
}
.balance-display .coin-icon { font-size: 16px; }

.sound-btn {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  opacity: 0.5;
  transition: opacity 0.15s;
}
.sound-btn:hover { opacity: 1; }

/* ===== MAIN CONTENT ===== */
.main-content {
  margin-top: 56px;
  max-width: 960px;
  margin-left: auto;
  margin-right: auto;
  padding: 32px 24px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 2;
}

/* ===== OPPONENT AREA (PRD §3.1 ①) ===== */
.opponent-area {
  width: 120px;
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  position: relative;
}

.opponent-hand {
  font-size: 48px;
  font-family: 'Press Start 2P', monospace;
  color: var(--neon-purple);
  text-shadow: 0 0 7px #B026FF, 0 0 15px #B026FF;
}

@keyframes pulse {
  0%, 100% { opacity: 1; text-shadow: 0 0 7px #B026FF, 0 0 15px #B026FF; }
  50% { opacity: 0.5; text-shadow: 0 0 3px #B026FF; }
}
.opponent-hand.pulsing { animation: pulse 2s ease-in-out infinite; }
.opponent-hand.fast-pulse { animation: pulse 0.3s ease-in-out infinite; }

@keyframes flipReveal {
  0% { transform: rotateY(0deg); }
  50% { transform: rotateY(90deg); }
  100% { transform: rotateY(0deg); }
}
.opponent-hand.flip {
  animation: flipReveal 0.5s ease-in-out;
}

.opponent-sprite {
  font-size: 80px;
  display: none;
}
.opponent-sprite.show {
  display: block;
}

/* ===== VS / RESULT AREA (PRD §3.1 ②) ===== */
.vs-area {
  text-align: center;
  margin-bottom: 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.vs-text {
  font-family: 'Press Start 2P', monospace;
  font-size: 36px;
  color: var(--neon-cyan);
  text-shadow: 0 0 7px #00F0FF, 0 0 10px #00F0FF, 0 0 21px #00F0FF, 0 0 42px #00F0FF;
}

@keyframes slowPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
.vs-text.pulsing { animation: slowPulse 2s ease-in-out infinite; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
.vs-text.blinking { animation: blink 0.1s step-start infinite; }

@keyframes winBounce {
  0% { transform: scale(1); }
  40% { transform: scale(1.3); }
  100% { transform: scale(1); }
}
.vs-text.win {
  color: var(--neon-yellow);
  text-shadow: 0 0 7px #FFE600, 0 0 10px #FFE600, 0 0 21px #FFE600, 0 0 42px #FFE600, 0 0 82px #FFE600;
  animation: winBounce 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}
.vs-text.lose {
  color: var(--neon-pink);
  text-shadow: 0 0 5px #FF2E97;
  animation: shake 0.3s ease-in-out 3;
}

.vs-text.draw {
  color: var(--text-secondary);
  text-shadow: none;
}

/* ===== HAND SELECTION (PRD §3.1 ③) ===== */
.hand-picker {
  display: flex;
  gap: 32px;
  margin-bottom: 32px;
}

.hand-btn {
  width: 160px;
  height: 160px;
  background: var(--bg-secondary);
  border: 2px solid rgba(0,240,255,0.2);
  border-radius: 2px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.15s ease-out;
  position: relative;
}

.hand-btn .hand-icon {
  font-size: 64px;
  transition: filter 0.15s;
  line-height: 1;
}
.hand-btn .hand-label {
  font-family: 'VT323', monospace;
  font-size: 18px;
  color: var(--text-secondary);
}

.hand-btn:hover {
  border-color: var(--neon-cyan);
  box-shadow: 0 0 5px #00F0FF, 0 0 15px rgba(0,240,255,0.3);
  transform: scale(1.05);
}
.hand-btn:hover .hand-icon { filter: brightness(1.2); }

.hand-btn.selected {
  border-color: var(--neon-cyan);
  border-width: 2px;
  background: rgba(0,240,255,0.08);
  box-shadow: 0 0 5px #00F0FF, 0 0 15px rgba(0,240,255,0.3), inset 0 0 5px rgba(0,240,255,0.1);
}

.hand-btn.dimmed {
  opacity: 0.4;
  box-shadow: none;
}

.hand-btn.disabled {
  pointer-events: none;
  opacity: 0.3;
}

/* Check badge */
.hand-btn.selected::after {
  content: '\2713';
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--neon-cyan);
  color: var(--bg-primary);
  width: 20px;
  height: 20px;
  border-radius: 2px;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: sans-serif;
}

/* ===== BET CONTROLS (PRD §3.1 ④) ===== */
.bet-controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
  width: 100%;
  max-width: 480px;
}

.bet-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.bet-adj-btn {
  width: 40px;
  height: 48px;
  background: transparent;
  border: 1px solid var(--neon-cyan);
  color: var(--neon-cyan);
  font-family: 'VT323', monospace;
  font-size: 24px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}
.bet-adj-btn:hover {
  background: rgba(0,240,255,0.1);
  box-shadow: 0 0 10px rgba(0,240,255,0.3);
}

.bet-input {
  width: 160px;
  height: 48px;
  background: var(--bg-surface);
  border: 1px solid var(--text-muted);
  color: var(--text-primary);
  font-family: 'VT323', monospace;
  font-size: 24px;
  text-align: right;
  padding: 0 12px;
  border-radius: 2px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.bet-input:focus {
  outline: none;
  border-color: var(--neon-cyan);
  box-shadow: 0 0 5px rgba(0,240,255,0.3);
}
.bet-input.error {
  border-color: var(--neon-pink);
}

.bet-quick-btn {
  width: 56px;
  height: 48px;
  background: transparent;
  border: 1px solid var(--neon-cyan);
  color: var(--neon-cyan);
  font-family: 'VT323', monospace;
  font-size: 18px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}
.bet-quick-btn:hover {
  background: rgba(0,240,255,0.1);
}

/* PLAY button */
.play-btn {
  width: 280px;
  height: 56px;
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  border: none;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.play-btn.primary {
  background: var(--neon-cyan);
  color: var(--bg-primary);
  box-shadow: 0 0 5px #00F0FF, 0 0 15px rgba(0,240,255,0.3);
}
@keyframes btnPulse {
  0%, 100% { box-shadow: 0 0 5px #00F0FF, 0 0 15px rgba(0,240,255,0.3); }
  50% { box-shadow: 0 0 10px #00F0FF, 0 0 25px rgba(0,240,255,0.5); }
}
.play-btn.primary.ready { animation: btnPulse 2s ease-in-out infinite; }
.play-btn.primary:hover {
  box-shadow: 0 0 10px #00F0FF, 0 0 30px rgba(0,240,255,0.5);
  transform: scale(1.02);
}
.play-btn.primary:active {
  transform: scale(0.95);
  box-shadow: none;
  filter: brightness(0.8);
}

.play-btn:disabled {
  background: var(--text-muted);
  color: var(--bg-primary);
  cursor: not-allowed;
  box-shadow: none;
  animation: none;
}

.play-btn.danger {
  background: var(--neon-pink);
  color: white;
}

.play-btn .spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--bg-primary);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  color: var(--neon-pink);
  font-size: 16px;
  margin-top: -8px;
}

/* ===== ROULETTE WHEEL ===== */
.roulette-container {
  position: relative;
  margin-top: 24px;
  display: none;
  flex-direction: column;
  align-items: center;
}

.roulette-container.show {
  display: flex;
  animation: scaleIn 0.3s ease-out;
}

@keyframes scaleIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.wheel-wrapper {
  position: relative;
  width: 280px;
  height: 280px;
}

.wheel-canvas {
  width: 280px;
  height: 280px;
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(0,240,255,0.2), 0 0 40px rgba(0,240,255,0.1), inset 0 0 0 3px rgba(0,240,255,0.3);
  transition: none;
}

/* Pointer / arrow at the top */
.wheel-pointer {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 24px solid var(--neon-yellow);
  filter: drop-shadow(0 0 6px rgba(255,230,0,0.8));
  z-index: 10;
}

@keyframes pointerBounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(4px); }
}
.wheel-pointer.bounce {
  animation: pointerBounce 0.3s ease-in-out 3;
}

/* ===== PAYOUT DISPLAY ===== */
.payout-display {
  text-align: center;
  margin-top: 24px;
  display: none;
}

.payout-display.show { display: block; }

.payout-amount {
  font-family: 'VT323', monospace;
  font-size: 36px;
  color: var(--neon-yellow);
  text-shadow: 0 0 7px #FFE600, 0 0 15px #FFE600;
}

.payout-label {
  font-size: 16px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* ===== JACKPOT OVERLAY ===== */
.jackpot-overlay {
  position: fixed;
  inset: 0;
  z-index: 10000;
  display: none;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.jackpot-overlay.show { display: flex; }

@keyframes jackpotFlash {
  0% { background: rgba(255,255,255,0.8); }
  100% { background: transparent; }
}
.jackpot-flash {
  position: fixed;
  inset: 0;
  animation: jackpotFlash 0.2s ease-out forwards;
  pointer-events: none;
}

@keyframes jackpotText {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.3); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
.jackpot-text {
  font-family: 'Press Start 2P', monospace;
  font-size: 56px;
  color: var(--neon-yellow);
  text-shadow: 0 0 7px #FFE600, 0 0 10px #FFE600, 0 0 21px #FFE600, 0 0 42px #FFE600, 0 0 82px #FFE600;
  animation: jackpotText 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
  z-index: 10001;
}

/* Coin particles */
.coin-particle {
  position: fixed;
  font-size: 24px;
  z-index: 10000;
  pointer-events: none;
  animation: coinFall linear forwards;
}
@keyframes coinFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ===== TOAST ===== */
.toast-container {
  position: fixed;
  top: 72px;
  right: 24px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  width: 320px;
  background: var(--bg-surface);
  border-radius: 2px;
  padding: 12px 16px;
  font-family: 'VT323', monospace;
  font-size: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: toastIn 0.3s ease-out;
  position: relative;
}
@keyframes toastIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.toast .bar {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  border-radius: 2px 0 0 2px;
}
.toast.error .bar { background: var(--neon-pink); }
.toast.success .bar { background: var(--neon-green); }
.toast.info .bar { background: var(--neon-cyan); }

.toast .close-btn {
  position: absolute;
  top: 4px;
  right: 8px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
}

/* ===== BOTTOM TICKER (PRD §2.3) ===== */
.bottom-ticker {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 36px;
  background: rgba(10,10,26,0.9);
  border-top: 1px solid rgba(0,240,255,0.1);
  overflow: hidden;
  z-index: 100;
  display: flex;
  align-items: center;
}

.ticker-track {
  display: flex;
  gap: 48px;
  white-space: nowrap;
  animation: tickerScroll 30s linear infinite;
  font-family: 'VT323', monospace;
  font-size: 14px;
  color: var(--text-muted);
  padding-left: 100%;
}
@keyframes tickerScroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

.ticker-item.win { color: var(--neon-green); }
.ticker-item.lose { color: var(--neon-pink); }
.ticker-item.jackpot {
  color: var(--neon-yellow);
  animation: blink 0.5s step-start infinite;
}

/* ===== HISTORY TABLE ===== */
.history-section {
  width: 100%;
  max-width: 720px;
  margin-top: 48px;
}

.history-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.history-table {
  width: 100%;
  border-collapse: collapse;
}
.history-table th {
  font-family: 'VT323', monospace;
  font-size: 14px;
  color: var(--text-muted);
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid rgba(0,240,255,0.1);
}
.history-table td {
  font-family: 'VT323', monospace;
  font-size: 18px;
  padding: 10px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.history-table tr:hover td { background: rgba(0,240,255,0.03); }

.tag-win { color: var(--neon-green); }
.tag-lose { color: var(--neon-pink); }
.tag-draw { color: var(--text-secondary); }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .hand-picker { gap: 12px; }
  .hand-btn { width: 100px; height: 100px; }
  .hand-btn .hand-icon { font-size: 40px; }
  .roulette-container { width: 320px; }
  .roulette-cell { width: 64px; height: 64px; font-size: 16px; }
  .roulette-highlight { width: 64px; margin-left: -32px; height: 64px; }
  .top-bar .logo { font-size: 12px; }
}

/* ===== REDUCED MOTION ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
  .scan-sweep { display: none; }
}
</style>
</head>
<body>

<div class="scan-sweep"></div>

<!-- TOP BAR -->
<div class="top-bar">
  <a href="index.html" class="logo">RPS CHAIN</a>
  <div class="top-bar-right">
    <a href="liquidity.html" style="background:transparent; border:1px solid var(--neon-cyan); color:var(--neon-cyan); font-family:'VT323',monospace; font-size:16px; padding:6px 16px; border-radius:2px; text-decoration:none; transition:all 0.15s;">LP POOL</a>
    <div class="balance-display">
      <span class="coin-icon">&#x1FA99;</span>
      <span id="balanceValue">&mdash;</span>
      <span style="font-size:14px; color:var(--text-secondary)">ETH</span>
    </div>
    <appkit-button size="sm"></appkit-button>
    <button class="sound-btn" id="soundBtn" title="Toggle sound">&#x1F507;</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

  <!-- Opponent area -->
  <div class="opponent-area">
    <span class="opponent-hand pulsing" id="opponentHand">?</span>
    <span class="opponent-sprite" id="opponentSprite"></span>
  </div>

  <!-- VS / Result area -->
  <div class="vs-area">
    <span class="vs-text pulsing" id="vsText">VS</span>
  </div>

  <!-- Hand selection -->
  <div class="hand-picker" id="handPicker">
    <button class="hand-btn" data-hand="0" aria-label="Rock">
      <span class="hand-icon">&#x270A;</span>
      <span class="hand-label">ROCK</span>
    </button>
    <button class="hand-btn" data-hand="2" aria-label="Scissors">
      <span class="hand-icon">&#x270C;&#xFE0F;</span>
      <span class="hand-label">SCISSORS</span>
    </button>
    <button class="hand-btn" data-hand="1" aria-label="Paper">
      <span class="hand-icon">&#x1F590;</span>
      <span class="hand-label">PAPER</span>
    </button>
  </div>

  <!-- Bet controls -->
  <div class="bet-controls" id="betControls">
    <div class="bet-row">
      <button class="bet-adj-btn" id="betMinus">&minus;</button>
      <input class="bet-input" id="betAmount" type="text" value="0.01" inputmode="decimal">
      <button class="bet-adj-btn" id="betPlus">+</button>
      <button class="bet-quick-btn" id="betX2">&times;2</button>
      <button class="bet-quick-btn" id="betMax">MAX</button>
    </div>
    <button class="play-btn primary" id="playBtn" disabled>SELECT HAND</button>
    <div class="error-msg" id="errorMsg" style="display:none;"></div>
  </div>

  <!-- Roulette wheel -->
  <div class="roulette-container" id="rouletteContainer">
    <div class="wheel-wrapper">
      <div class="wheel-pointer" id="wheelPointer"></div>
      <canvas class="wheel-canvas" id="wheelCanvas" width="560" height="560"></canvas>
    </div>
  </div>

  <!-- Payout display -->
  <div class="payout-display" id="payoutDisplay">
    <div class="payout-amount" id="payoutAmount"></div>
    <div class="payout-label" id="payoutLabel"></div>
